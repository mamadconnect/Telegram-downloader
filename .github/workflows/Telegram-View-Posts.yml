name: 02- 📥 Channel Posts (Smart Pagination – No API)

on:
  workflow_dispatch:
    inputs:
      channel:
        description: '🔗 Channel username (without @)'
        required: true
        type: string
      password:
        description: '🔐 Archive password (optional)'
        required: false
        default: ''
        type: string
      post_count:
        description: '📊 Number of posts (default 10)'
        required: false
        default: '10'
        type: string

jobs:
  download-channel-posts:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      contents: write

    steps:
      - name: 📂 Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: ⚙️ Configure Git
        run: |
          git config --global http.postBuffer 524288000
          git config --global http.maxRequestBuffer 100M
          git config --global core.compression 0
          git config --global pack.windowMemory 256m
          git config --global pack.packSizeLimit 100m
          git config --global pack.threads 1
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

      - name: 🔧 Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y curl jq p7zip-full python3 wget

      # --------------------------------------------------------------------
      # Step 4 – Collect enough post IDs by scrolling pages
      # --------------------------------------------------------------------
      - name: 🔍 Collect post IDs (multi‑page)
        id: fetch-posts
        run: |
          CHANNEL="${{ github.event.inputs.channel }}"
          COUNT="${{ github.event.inputs.post_count }}"
          CHANNEL="${CHANNEL#@}"
          echo "📡 Channel: $CHANNEL  |  Target: $COUNT posts"

          cat > /tmp/paginate.py << 'PYEOF'
          import sys, re, urllib.request, urllib.error

          channel = sys.argv[1].lower()
          needed = int(sys.argv[2])
          base = f"https://t.me/s/{channel}"
          headers = {"User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/125.0.0.0 Safari/537.36"}

          ids_dates = []   # list of (pid_int, datetime_str)
          seen = set()
          page_url = base

          while len(ids_dates) < needed:
              req = urllib.request.Request(page_url, headers=headers)
              try:
                  with urllib.request.urlopen(req, timeout=25) as resp:
                      page = resp.read().decode('utf-8')
              except Exception as e:
                  print(f"⚠️ Failed to fetch {page_url}: {e}", file=sys.stderr)
                  if page_url == base:
                      sys.exit(1)
                  break

              page_matches = re.findall(r'data-post="([^/]+)/(\d+)"', page)
              if not page_matches:
                  # No posts on this page – stop
                  break

              page_ids = []
              for ch, pid in page_matches:
                  if ch.lower() == channel and pid.isdigit():
                      pid_int = int(pid)
                      if pid_int not in seen:
                          seen.add(pid_int)
                          # extract timestamp
                          rest = page[page.index(f'data-post="{ch}/{pid}"'):]
                          time_match = re.search(r'<time[^>]*datetime="([^"]+)"', rest)
                          dt = time_match.group(1) if time_match else "Unknown"
                          page_ids.append((pid_int, dt))

              # sort newest first
              page_ids.sort(key=lambda x: x[0], reverse=True)
              ids_dates.extend(page_ids)
              ids_dates.sort(key=lambda x: x[0], reverse=True)
              ids_dates = ids_dates[:needed]  # keep only needed best

              if len(ids_dates) >= needed:
                  break

              # next page: oldest ID on this page minus 1 (or use ?before=)
              oldest = min(page_ids, key=lambda x: x[0])[0] if page_ids else None
              if oldest:
                  page_url = f"{base}?before={oldest}"
              else:
                  break

          # Output one line per post: id|date
          for pid, dt in ids_dates:
              print(f"{pid}|{dt}")
          PYEOF

          python3 /tmp/paginate.py "$CHANNEL" "$COUNT" > /tmp/posts_list.txt
          if [ ! -s /tmp/posts_list.txt ]; then
            echo "❌ No posts found"
            exit 1
          fi

          POST_IDS=$(cat /tmp/posts_list.txt | cut -d'|' -f1 | tr '\n' ' ')
          POST_DATES=$(cat /tmp/posts_list.txt | cut -d'|' -f2 | tr '\n' ' ')
          echo "✅ Collected $(echo $POST_IDS | wc -w) posts"
          echo "post_ids=$POST_IDS" >> $GITHUB_OUTPUT
          echo "post_dates=$POST_DATES" >> $GITHUB_OUTPUT
          echo "channel=$CHANNEL" >> $GITHUB_OUTPUT

      # --------------------------------------------------------------------
      # Step 5 – Extract text, links, download files for each post
      # --------------------------------------------------------------------
      - name: ⬇️ Process each post (text + files)
        id: download-all
        run: |
          CHANNEL="${{ steps.fetch-posts.outputs.channel }}"
          POST_IDS="${{ steps.fetch-posts.outputs.post_ids }}"
          POST_DATES="${{ steps.fetch-posts.outputs.post_dates }}"
          BACKUP_DIR="/tmp/tg_backup_$$"
          mkdir -p "$BACKUP_DIR/posts"

          # Helper Python scripts (same as before, but included inline)
          cat > /tmp/extract_text_links.py << 'PYEOF'
          import sys, re, html
          from html.parser import HTMLParser

          class LinkExtractor(HTMLParser):
              def __init__(self):
                  super().__init__()
                  self.links = []
                  self.current_href = None
                  self.current_text = ""
              def handle_starttag(self, tag, attrs):
                  if tag == 'a':
                      attrs_dict = dict(attrs)
                      href = attrs_dict.get('href', '')
                      if href and not href.startswith('#'):
                          self.current_href = href
                          self.current_text = ""
              def handle_endtag(self, tag):
                  if tag == 'a' and self.current_href:
                      text = self.current_text.strip()
                      if text:
                          self.links.append((text, self.current_href))
                      self.current_href = None
              def handle_data(self, data):
                  if self.current_href:
                      self.current_text += data

          page = sys.stdin.read()
          text = ""
          links = []

          div_match = re.search(r'<div\s+class="tgme_widget_message_text[^"]*"[^>]*>(.*?)</div>', page, re.DOTALL)
          if div_match:
              inner = div_match.group(1)
              plain = html.unescape(re.sub(r'<[^>]+>', ' ', inner))
              text = re.sub(r'\s+', ' ', plain).strip()
              parser = LinkExtractor()
              parser.feed('<div>' + inner + '</div>')
              links = parser.links
          else:
              meta_match = re.search(r'<meta\s+property="og:description"\s+content="([^"]+)"', page)
              if meta_match:
                  raw = meta_match.group(1)
                  if '...' in raw:
                      raw = raw.split('...', 1)[1]
                  text = raw.strip()

          if not links:
              raw_urls = re.findall(r'(https?://[^\s<>"]+)', page)
              for u in raw_urls:
                  if 't.me/' not in u and 'cdn' not in u:
                      links.append((u, u))

          print(text)
          for lt, lu in links:
              lt = re.sub(r'<[^>]+>', '', lt).strip()
              if lt and lu:
                  print(f"{lt}|{lu}")
          PYEOF

          cat > /tmp/find_file_url.sh << 'BASH'
          #!/bin/bash
          POST_LINK="$1"
          OUTPUT_FILE="$2"
          EMBED_URL="${POST_LINK/s\//\/}?embed=1"

          # Method 1: og meta
          PAGE=$(curl -sL --max-time 20 -H "User-Agent: Mozilla/5.0" "$EMBED_URL")
          for meta in "og:image" "og:video" "og:video:url" "og:video:secure_url"; do
            URL=$(echo "$PAGE" | grep -oP '(?<=<meta\s+property="'"$meta"'"\s+content=")[^"]+' | head -1)
            if [ -n "$URL" ]; then
              echo "$URL" > "$OUTPUT_FILE"
              return 0
            fi
          done

          # Method 2: Direct CDN regex
          PAGE2=$(curl -sL --max-time 20 -H "User-Agent: TelegramBot (like TwitterBot)" "$POST_LINK")
          CDN=$(echo "$PAGE2" | grep -oP 'https?://cdn[0-9a-zA-Z-]*\.(telesco\.pe|telegram\.org|telegram-cdn\.org|cdn-telegram\.org)/file/[^"'"'"'?\s]+' | head -1)
          if [ -n "$CDN" ]; then
            echo "$CDN" > "$OUTPUT_FILE"
            return 0
          fi

          # Method 3: third-party APIs (telegramdownloader)
          ENC=$(python3 -c "import urllib.parse; print(urllib.parse.quote('$POST_LINK'))")
          RESP=$(curl -s --max-time 30 -X POST -d "telegram_link=$ENC" -H "User-Agent: Mozilla/5.0" https://telegramdownloader.net/proxy.php)
          URL3=$(echo "$RESP" | jq -r '.data.data.link // empty' 2>/dev/null)
          if [ -n "$URL3" ] && [ "$URL3" != "null" ]; then
            echo "$URL3" > "$OUTPUT_FILE"
            FN=$(echo "$RESP" | jq -r '.data.data.file_name // empty' 2>/dev/null)
            [ -n "$FN" ] && echo "$FN" > "${OUTPUT_FILE}.name"
            return 0
          fi

          return 1
          BASH
          chmod +x /tmp/find_file_url.sh

          IFS=' ' read -ra IDS <<< "$POST_IDS"
          IFS=' ' read -ra DATES <<< "$POST_DATES"

          for i in "${!IDS[@]}"; do
            pid="${IDS[$i]}"
            post_date="${DATES[$i]}"
            echo ""
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "📌 Post $pid — $post_date"
            POST_DIR="$BACKUP_DIR/posts/${CHANNEL}/${pid}"
            mkdir -p "$POST_DIR"
            echo "$post_date" > "$POST_DIR/timestamp.txt"

            # --- TEXT & LINKS ---
            EMBED_URL="https://t.me/s/${CHANNEL}/${pid}?embed=1"
            FULL_URL="https://t.me/s/${CHANNEL}/${pid}"
            TEXT_OK=false
            for attempt in 1 2; do
              PAGE=$(curl -sL --max-time 20 --retry 2 -H "User-Agent: Mozilla/5.0" \
                "$([[ $attempt -eq 1 ]] && echo $EMBED_URL || echo $FULL_URL)")
              [ -z "$PAGE" ] && continue
              echo "$PAGE" | python3 /tmp/extract_text_links.py > "$POST_DIR/extracted.tmp"
              MESSAGE_TEXT=$(head -1 "$POST_DIR/extracted.tmp")
              if [ -n "$MESSAGE_TEXT" ] && [ ${#MESSAGE_TEXT} -gt 3 ]; then
                echo "$MESSAGE_TEXT" > "$POST_DIR/message.txt"
                echo "   ✅ Text extracted (${#MESSAGE_TEXT} chars)"
                TEXT_OK=true
                break
              fi
            done
            [ "$TEXT_OK" = false ] && echo "ℹ️ No text found." > "$POST_DIR/message.txt"

            tail -n +2 "$POST_DIR/extracted.tmp" > "$POST_DIR/links.tmp" 2>/dev/null
            if [ -s "$POST_DIR/links.tmp" ]; then
              mv "$POST_DIR/links.tmp" "$POST_DIR/links.txt"
              echo "   🔗 $(wc -l < "$POST_DIR/links.txt") link(s)"
            else
              rm -f "$POST_DIR/links.tmp"
            fi
            rm -f "$POST_DIR/extracted.tmp"

            # --- FILE DOWNLOAD ---
            URL_FILE="$POST_DIR/download_url.txt"
            if /tmp/find_file_url.sh "https://t.me/${CHANNEL}/${pid}" "$URL_FILE"; then
              RAW_URL=$(cat "$URL_FILE")
              echo "   🔗 Found: ${RAW_URL:0:80}..."
              FILE_NAME=""
              [ -f "${URL_FILE}.name" ] && FILE_NAME=$(cat "${URL_FILE}.name")
              [ -z "$FILE_NAME" ] && FILE_NAME=$(python3 -c "import urllib.parse; print(urllib.parse.unquote('$RAW_URL'.split('?')[0].split('/')[-1]))")
              SAFE=$(echo "$FILE_NAME" | iconv -f utf-8 -t ascii//TRANSLIT 2>/dev/null | sed 's/ /-/g' | sed 's/[^a-zA-Z0-9._-]/_/g' | tr -s '-' | sed 's/^[._-]*//')
              [ -z "$SAFE" ] && SAFE="file_${pid}"
              [ ${#SAFE} -gt 200 ] && SAFE="${SAFE:0:200}"

              echo "   ⬇️ Downloading $SAFE ..."
              SUCCESS=false
              for tool in curl wget; do
                if [ "$tool" = "curl" ]; then
                  curl -L --progress-bar --max-time 1800 --retry 2 --retry-delay 10 \
                    -H "User-Agent: Mozilla/5.0" -o "$POST_DIR/$SAFE" "$RAW_URL" && SUCCESS=true
                else
                  wget -q --show-progress --timeout=1800 --tries=2 \
                    --user-agent="Mozilla/5.0" -O "$POST_DIR/$SAFE" "$RAW_URL" && SUCCESS=true
                fi
                [ "$SUCCESS" = true ] && break
              done
              if [ "$SUCCESS" = true ] && [ -f "$POST_DIR/$SAFE" ]; then
                SIZE=$(stat -c%s "$POST_DIR/$SAFE" 2>/dev/null || echo 0)
                if [ "$SIZE" -ge 1024 ]; then
                  echo "   ✅ File saved ($(numfmt --to=iec $SIZE 2>/dev/null || echo $SIZE))"
                else
                  rm "$POST_DIR/$SAFE"
                  echo "   ⚠️ File too small, removed"
                fi
              else
                echo "   ❌ Download failed – URL kept"
              fi
            else
              echo "   ℹ️ No downloadable file detected"
            fi
            echo "✅ Post $pid completed."
          done

          echo "💾 Backup dir: $BACKUP_DIR"
          echo "backup_dir=$BACKUP_DIR" >> $GITHUB_OUTPUT

      # --------------------------------------------------------------------
      # Step 6 – Push & build README (unchanged style)
      # --------------------------------------------------------------------
      - name: 📤 Push & build Telegram‑style README
        run: |
          BACKUP_DIR="${{ steps.download-all.outputs.backup_dir }}"
          BRANCH="${GITHUB_REF_NAME}"
          OWNER="${{ github.repository_owner }}"
          REPO="${{ github.event.repository.name }}"
          CHANNEL="${{ steps.fetch-posts.outputs.channel }}"

          git fetch origin "$BRANCH" --quiet
          git reset --hard origin/"$BRANCH"
          mkdir -p posts
          cp -r "$BACKUP_DIR"/posts/* posts/ 2>/dev/null || true

          # Generate README for this channel (same as original)
          cat > /tmp/gen_channel_readme.py << 'PYEOF'
          import os, urllib.parse, sys
          from datetime import datetime, timezone

          CHANNEL = sys.argv[1]
          BRANCH = sys.argv[2]
          OWNER = sys.argv[3]
          REPO = sys.argv[4]
          BASE_PATH = f"posts/{CHANNEL}"

          def format_ts(ts):
              try:
                  dt = datetime.fromisoformat(ts)
                  return dt.astimezone(timezone.utc).strftime("%Y-%m-%d %H:%M UTC")
              except:
                  return ts

          lines = [f"# 📡 @{CHANNEL} – Telegram Archive", "",
                   "> *Posts are displayed newest first, with bubble‑style text.*", "", "---", ""]

          if not os.path.exists(BASE_PATH):
              lines.append("⚠️ No posts downloaded yet.")
              print("\n".join(lines))
              sys.exit(0)

          posts = sorted([d for d in os.listdir(BASE_PATH)
                          if os.path.isdir(os.path.join(BASE_PATH, d)) and d.isdigit()],
                         key=lambda x: int(x), reverse=True)

          for idx, pid in enumerate(posts, 1):
              d = os.path.join(BASE_PATH, pid)
              ts_file = os.path.join(d, "timestamp.txt")
              ts = "Unknown"
              if os.path.exists(ts_file):
                  with open(ts_file) as f: ts = format_ts(f.read().strip())

              lines.append(f"### 📌 Post {idx} — ID `{pid}`")
              lines.append(f"**📢 @{CHANNEL}**  \n📅 {ts}\n")

              msgf = os.path.join(d, "message.txt")
              if os.path.exists(msgf):
                  with open(msgf, encoding='utf-8') as f:
                      text = f.read().strip()
                  if text:
                      bubble = "\n> ".join(text.splitlines())
                      lines.append(f"> {bubble}\n")
              else:
                  lines.append("")

              lf = os.path.join(d, "links.txt")
              if os.path.exists(lf):
                  with open(lf, encoding='utf-8') as f:
                      raw = f.read().strip()
                  if raw:
                      lines.append("🔗 **Links:**")
                      for ln in raw.splitlines():
                          if '|' in ln:
                              txt, url = ln.split('|', 1)
                              lines.append(f"- [{txt.strip()}]({url.strip()})")
                          else:
                              lines.append(f"- {ln}")
                      lines.append("")

              files = [f for f in os.listdir(d) if f not in ("message.txt", "README.md", "timestamp.txt", "download_url.txt", "links.txt")]
              url_f = os.path.join(d, "download_url.txt")
              has_url = os.path.exists(url_f)
              raw_url = ""
              if has_url:
                  with open(url_f) as f: raw_url = f.read().strip()

              if files or has_url:
                  lines.append("📎 **Attachments:**")
                  imgs = [f for f in files if os.path.splitext(f)[1].lower() in ('.jpg','.jpeg','.png','.gif','.webp')]
                  others = [f for f in files if f not in imgs]
                  for f in imgs:
                      enc = urllib.parse.quote(f)
                      url = f"https://github.com/{OWNER}/{REPO}/raw/{BRANCH}/posts/{urllib.parse.quote(CHANNEL)}/{urllib.parse.quote(pid)}/{enc}"
                      lines.append(f"![{f}]({url})")
                  for f in others:
                      enc = urllib.parse.quote(f)
                      url = f"https://github.com/{OWNER}/{REPO}/raw/{BRANCH}/posts/{urllib.parse.quote(CHANNEL)}/{urllib.parse.quote(pid)}/{enc}"
                      ext = os.path.splitext(f)[1].upper().lstrip('.')
                      icon = "🎬" if ext in ("MP4","MOV","AVI","MKV") else "🎵" if ext in ("MP3","M4A","WAV","FLAC") else "📄"
                      lines.append(f"{icon} [`{f}`]({url}) ({ext})")
                  if not files and has_url and raw_url:
                      lines.append(f"⚠️ Download failed — [direct link]({raw_url})")
                  elif has_url and raw_url:
                      lines.append(f"🔗 [Direct Telegram link]({raw_url})")
                  lines.append("")

              lines.append("---\n")

          lines.append("*✨ Generated by GitHub Actions*")
          print("\n".join(lines))
          PYEOF

          python3 /tmp/gen_channel_readme.py "$CHANNEL" "$BRANCH" "$OWNER" "$REPO" > "posts/${CHANNEL}/README.md"

          # Root README index
          cat > /tmp/gen_index.py << 'PYEOF'
          import os, urllib.parse, sys
          BRANCH = sys.argv[1]
          OWNER = sys.argv[2]
          REPO = sys.argv[3]
          lines = ["# 📥 Telegram Channels Archive", ""]
          if os.path.exists("posts"):
              channels = [d for d in os.listdir("posts") if os.path.isdir(os.path.join("posts", d)) and not d.startswith('.')]
              for ch in sorted(channels):
                  enc = urllib.parse.quote(ch)
                  lines.append(f"- 📡 **{ch}** → [View posts](https://github.com/{OWNER}/{REPO}/tree/{BRANCH}/posts/{enc})")
          print("\n".join(lines))
          PYEOF

          python3 /tmp/gen_index.py "$BRANCH" "$OWNER" "$REPO" > posts/README.md

          git add posts/
          if git diff --cached --quiet; then
            echo "⚠️ No changes to commit."
            exit 0
          fi
          git commit -m "📲 Update @${CHANNEL} posts [skip ci]"
          for i in {1..5}; do
            if timeout 300 git push origin HEAD:"$BRANCH"; then
              echo "✅ Push successful."
              exit 0
            fi
            sleep 10
            git fetch origin "$BRANCH" --quiet
            git reset --hard origin/"$BRANCH"
            cp -r "$BACKUP_DIR"/posts/* posts/ 2>/dev/null || true
            python3 /tmp/gen_channel_readme.py "$CHANNEL" "$BRANCH" "$OWNER" "$REPO" > "posts/${CHANNEL}/README.md"
            python3 /tmp/gen_index.py "$BRANCH" "$OWNER" "$REPO" > posts/README.md
            git add posts/
            git commit -m "📲 Retry push [skip ci]" --quiet
          done
          echo "❌ Push failed after 5 attempts."
          exit 1

      - name: 📋 Final report
        if: always()
        run: |
          echo "┌───────────────────────────────────────────────┐"
          echo "│        📥 Channel posts download finished      │"
          echo "├───────────────────────────────────────────────┤"
          echo "│ 📡 Channel : ${{ steps.fetch-posts.outputs.channel }}"
          echo "│ 📊 Posts   : $(echo ${{ steps.fetch-posts.outputs.post_ids }} | wc -w)"
          echo "└───────────────────────────────────────────────┘"
